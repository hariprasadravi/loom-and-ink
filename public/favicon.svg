<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer circle with terracotta red border representing traditional ethnic branding -->
  <circle cx="32" cy="32" r="30" fill="#fcfaf6" stroke="#b5513d" stroke-width="3"/>
  
  <!-- Stylized golden silk spool ends -->
  <path d="M22 20 C22 17, 42 17, 42 20 C42 21, 38 24, 32 24 C26 24, 22 21, 22 20 Z" fill="#c5a059"/>
  <path d="M22 44 C22 41, 42 41, 42 44 C42 45, 38 48, 32 48 C26 48, 22 45, 22 44 Z" fill="#c5a059"/>
  
  <!-- Fine golden silk threads wound on the spool -->
  <path d="M24 20 L24 44 M28 22 L28 42 M32 23 L32 41 M36 22 L36 42 M40 20 L40 44" stroke="#c5a059" stroke-width="2" stroke-linecap="round"/>
  
  <!-- A single elegant loop of raw terracotta thread flowing off the spool representing silk weaving -->
  <path d="M32 41 C20 48, 14 36, 18 28 C20 25, 25 24, 28 26" stroke="#b5513d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>